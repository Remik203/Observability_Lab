---
- name: Cluster prep
  hosts: k3s_cluster
  gather_facts: true
  become: true
  roles:
    - role: prereq

- name: Setup K3S server
  hosts: k3s_cluster
  gather_facts: false
  become: true
  roles:
    - role: k3s
    
- name: Setup client machine (K6)
  hosts: load_generator
  become: true
  tasks:
    - ansible.builtin.include_role:
        name: k6
