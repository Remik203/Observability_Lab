---
- name: Implementation of Google Online Boutique (Official Google Repo)
  ansible.builtin.command:
    cmd: kubectl apply -f https://raw.githubusercontent.com/GoogleCloudPlatform/microservices-demo/main/release/kubernetes-manifests.yaml
  register: kubectl_apply_result
  changed_when: "'created' in kubectl_apply_result.stdout or 'configured' in kubectl_apply_result.stdout"

- name: Turn off built in loadgenerator
  ansible.builtin.command:
    cmd: kubectl scale deployment loadgenerator --replicas=0
  changed_when: true

- name: Change frontend-external to NodePort
  ansible.builtin.command:
    cmd: >
      kubectl patch svc frontend-external -p
      '{"spec": {"type": "NodePort", "ports": [{"port": 80, "targetPort": 8080, "nodePort": 30080}]}}'
  changed_when: true

- name: Patch all microservices with generous limits and relaxed probes to survive OTel injection
  ansible.builtin.command:
    cmd: >
      kubectl patch deployment {{ item }} -p
      '{"spec": {"template": {"spec": {"containers": [{"name": "server", "resources": {"limits": {"memory": "1Gi"}, "requests": {"memory": "64Mi"}}, "readinessProbe": {"initialDelaySeconds": 45}, "livenessProbe": {"initialDelaySeconds": 45}}]}}}}'
  loop:
    - adservice
    - cartservice
    - checkoutservice
    - currencyservice
    - emailservice
    - frontend
    - paymentservice
    - productcatalogservice
    - recommendationservice
    - shippingservice
  changed_when: true

- name: Patch VM/Runtime-based deployments with OpenTelemetry auto-instrumentation annotations
  ansible.builtin.command:
    cmd: >
      kubectl patch deployment {{ item.name }} -p
      '{"spec": {"template": {"metadata": {"annotations": {"instrumentation.opentelemetry.io/inject-{{ item.lang }}": "true"}}}}}'
  loop:
    # Inject Java agent and configure JAVA_TOOL_OPTIONS
    - { name: 'adservice', lang: 'java' }
    # Inject Python enviroment with set PYTHONPATH
    - { name: 'recommendationservice', lang: 'python' }
    - { name: 'emailservice', lang: 'python' }
    # Inject NODE.JS modules
    - { name: 'currencyservice', lang: 'nodejs' }
    - { name: 'paymentservice', lang: 'nodejs' }
    # Inject .NET agent
    - { name: 'cartservice', lang: 'dotnet' }
    # Can't auto-instrument GOLANG apps using SDK. eBPF only auto-instrumentations is available 
  changed_when: true

- name: Wait until all pods are ready (can take a few minutes)
  ansible.builtin.command:
    cmd: kubectl wait --for=condition=available deployment --all --timeout=300s
  changed_when: false
# tasks file for roles/google_demo


