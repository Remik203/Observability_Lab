---
- name: Implementation of Google Online Boutique (Official Google Repo)
  ansible.builtin.command:
    cmd: kubectl apply -f https://raw.githubusercontent.com/GoogleCloudPlatform/microservices-demo/main/release/kubernetes-manifests.yaml
  register: kubectl_apply_result
  changed_when: "'created' in kubectl_apply_result.stdout or 'configured' in kubectl_apply_result.stdout"

- name: Turn off built in loadgenerator
  ansible.builtin.command:
    cmd: kubectl scale deployment loadgenerator --replicas=0
  changed_when: true

- name: Change frontend-external to NodePort (so SecondaryVM with K6 can see it)
  ansible.builtin.command:
    cmd: kubectl patch svc frontend-external -p '{"spec": {"type": "NodePort", "ports": [{"port": 80, "targetPort": 8080, "nodePort": 30080}]}}'
  changed_when: true

- name: Wait until all pods are ready (can take a few minutes)
  ansible.builtin.command:
    cmd: kubectl wait --for=condition=available deployment --all --timeout=300s
  changed_when: false
# tasks file for roles/google_demo
