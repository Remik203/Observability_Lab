---
- name: Add Helm repository for Jaeger
  kubernetes.core.helm_repository:
    name: jaegertracing
    repo_url: "https://jaegertracing.github.io/helm-charts"

- name: Install Jaeger (All-in-One, In-Memory)
  kubernetes.core.helm:
    name: jaeger
    chart_ref: jaegertracing/jaeger
    release_namespace: observability
    create_namespace: true
    state: "{{ stack_state | default('present') }}"
    wait: true
    values:
      # All-In-One mode for better performance
      provisionDataStore: shared
      allInOne:
        enabled: true
        service:
          type: NodePort
      storage:
        type: memory
        options:
          memory:
            max-traces: 100000
      agent:
        enabled: false
      collector:
        enabled: false
      query:
        enabled: false
# tasks file for roles/jaeger_v2
